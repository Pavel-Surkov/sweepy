name: Release

# Only do the release on x.y.z tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# To be able to create releases
permissions:
  contents: write

jobs:
  # The release job runs to initialize the GitHub and cargo releases
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the release version from the tag
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Check tag version matches Cargo.toml
        run: |
          cargo_version="v$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)"
          if [ "$cargo_version" != "$VERSION" ]; then
            echo "Tag $VERSION does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all-features

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}

      # Requires CARGO_REGISTRY_TOKEN secret in repository settings.
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
